name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - "**"
      - "!main"

jobs:
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Validate HTML structure
        run: |
          echo "Checking HTML files exist..."
          test -f index.html || exit 1
          echo "✓ index.html found"

          echo "Checking assets directory..."
          test -d assets/images || exit 1
          echo "✓ assets/images directory found"

          echo "Checking for required images..."
          test -f assets/images/app-logo.png || echo "⚠ Warning: app-logo.png not found"
          test -f assets/images/company-logo.png || echo "⚠ Warning: company-logo.png not found"

          echo "✓ Validation complete"

      - name: Check HTML syntax
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          css: false

  lint-commits:
    name: Lint Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install commitlint
        run: |
          npm install --save-dev @commitlint/cli@latest @commitlint/config-conventional@latest

      - name: Validate PR commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
